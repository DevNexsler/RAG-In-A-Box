services:
  doc-organizer:
    build: .
    image: doc-organizer:latest
    container_name: doc-organizer
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "7788:7788"
    volumes:
      - /home/danpark/documents/doc-organizer:/data/documents
      - doc-organizer-data:/data/index
      - ./config.yaml:/app/config.yaml:ro
      - ./.evals:/app/.evals
    command: ["sh", "-c", "mkdir -p /data/documents /data/index && python server.py"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rag-net
      - sor-net
      - comm-net
      - mcp-backplane
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}
      - API_KEY=${API_KEY}
      - COMM_DATA_STORE_DSN=${COMM_DATA_STORE_DSN}
      - COMM_DATA_STORE_HOOK_SECRET=${COMM_DATA_STORE_HOOK_SECRET}
      - SOR_DSN=${SOR_DSN}
      - DOCUMENTS_ROOT=/data/documents
      - INDEX_ROOT=/data/index
      - INDEXER_DEBUG_CONCURRENCY=${INDEXER_DEBUG_CONCURRENCY:-}

networks:
  rag-net:
    external: true
    name: rag-in-a-box_default
  sor-net:
    external: true
    name: sor-network
  comm-net:
    external: true
    name: comm-data-store_default
  mcp-backplane:
    external: true

volumes:
  doc-organizer-data:
