services:
  doc-organizer:
    build: .
    image: doc-organizer:latest
    container_name: doc-organizer
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "7788:7788"
    volumes:
      - /home/danpark/documents/doc-organizer:/data/documents
      - doc-organizer-data:/data/index
      - ./config.yaml:/app/config.yaml:ro
      - ./.evals:/app/.evals
    command: ["sh", "-c", "mkdir -p /data/documents /data/index && python server.py"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rag-net
      - sor-net
      - comm-net
      - mcp-backplane
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - API_KEY=${API_KEY}
      - COMM_DATA_STORE_DSN=${COMM_DATA_STORE_DSN}
      - COMM_DATA_STORE_HOOK_SECRET=${COMM_DATA_STORE_HOOK_SECRET}
      - SOR_DSN=${SOR_DSN}
      - DOCUMENTS_ROOT=/data/documents
      - INDEX_ROOT=/data/index
      - INDEXER_DEBUG_CONCURRENCY=${INDEXER_DEBUG_CONCURRENCY:-}
      # Prune Lance versions older than this each indexing run (#0112); keeps
      # the index from re-accumulating dead versions. Default 30m if unset.
      - LANCE_VERSION_RETENTION_MINUTES=${LANCE_VERSION_RETENTION_MINUTES:-30}
      # Keep exactly this many daily version tags as logical restore points
      # (#0113); each is an in-place rollback target protected from the prune.
      # With daily compaction every retained tag pins one full rewrite of the
      # table on disk, so the window stays small (#0232). 0 = off (and removes
      # previously created daily tags).
      - LANCE_DAILY_RESTORE_POINTS=${LANCE_DAILY_RESTORE_POINTS:-7}
      # /health returns 503 when the index filesystem is at/above this
      # used-percent (#0232), so docker-health surfaces disk pressure
      # before ENOSPC takes the host down.
      - DISK_USAGE_MAX_PERCENT=${DISK_USAGE_MAX_PERCENT:-90}

networks:
  rag-net:
    external: true
    name: rag-in-a-box_default
  sor-net:
    external: true
    name: sor-network
  comm-net:
    external: true
    name: comm-data-store_default
  mcp-backplane:
    external: true

volumes:
  doc-organizer-data:
